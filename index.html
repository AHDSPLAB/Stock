document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"--accent:#0d9488; font-family:'Figtree',system-ui,sans-serif; background:#f7f3ee; color:#2b2723; min-height:100vh;\">\n\n  <header style=\"display:flex; align-items:center; gap:16px; padding:15px 28px; background:#fffdfb; border-bottom:1px solid #ece4d8; position:sticky; top:0; z-index:6;\">\n    <div style=\"display:flex; align-items:center; gap:12px;\">\n      <div style=\"width:38px; height:38px; border-radius:11px; background:var(--accent); display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(13,148,136,.32);\">\n        <div style=\"width:13px; height:13px; border-radius:50% 50% 50% 2px; background:#fff; transform:rotate(45deg);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:19px; letter-spacing:-.02em;\">ReagentTrack<\u002Fdiv>\n        <div style=\"font-size:11.5px; color:#94897b; margin-top:1px;\">Laboratory inventory<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div style=\"{{ statusStyle }}\"><span style=\"{{ statusDotStyle }}\"><\u002Fspan>{{ statusLabel }}<\u002Fdiv>\n    <button onclick=\"{{ openImport }}\" title=\"Import reagents from an Excel file\" style=\"display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border:1px solid #e1dbef; background:#f0edf9; color:#5b46b8; border-radius:10px; font-size:12.5px; font-weight:600; cursor:pointer; flex:none;\" style-hover=\"background:#e7e2f5;\"><span style=\"font-size:14px; line-height:1;\">⤒<\u002Fspan>Import Excel<\u002Fbutton>\n    <button onclick=\"{{ openExport }}\" title=\"Download inventory as an Excel file\" style=\"display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border:1px solid #d8eeea; background:#e9f6f3; color:#0b7d72; border-radius:10px; font-size:12.5px; font-weight:600; cursor:pointer; flex:none;\" style-hover=\"background:#d6efe9;\"><span style=\"font-size:14px; line-height:1;\">⤓<\u002Fspan>Export Excel<\u002Fbutton>\n    <button onclick=\"{{ openBackup }}\" title=\"Back up all data, or restore from a backup file\" style=\"display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border:1px solid #f0d9b8; background:#fdf1e0; color:#b76b09; border-radius:10px; font-size:12.5px; font-weight:600; cursor:pointer; flex:none;\" style-hover=\"background:#fbe7c9;\"><span style=\"font-size:14px; line-height:1;\">⟳<\u002Fspan>Backup<\u002Fbutton>\n    <div style=\"position:relative; width:300px;\">\n      <input name=\"search\" value=\"{{ form.search }}\" onchange=\"{{ handleField }}\" placeholder=\"Search reagents or lot numbers…\" style=\"width:100%; padding:10px 12px 10px 36px; border:1px solid #e3dacd; background:#fbf9f6; border-radius:10px; font-size:13.5px; outline:none; color:#2b2723;\">\n      <div style=\"position:absolute; left:13px; top:50%; transform:translateY(-50%); width:12px; height:12px; border:2px solid #b3a892; border-radius:50%;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ showMain }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:14px; padding:20px 28px 0; min-width:1240px;\">\n    <div onclick=\"{{ onClearFilter }}\" title=\"Show all reagents\" style=\"{{ totalCardStyle }}\">\n      <div style=\"width:40px; height:40px; border-radius:11px; background:#e9f6f3; display:flex; align-items:center; justify-content:center; flex:none;\"><div style=\"width:14px; height:14px; border-radius:4px; background:var(--accent);\"><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-size:25px; font-weight:700; line-height:1;\">{{ statTotal }}<\u002Fdiv><div style=\"font-size:12px; color:#94897b; margin-top:4px; font-weight:500;\">Reagents tracked<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ onFilterSoon }}\" title=\"Filter: expiring soon\" style=\"{{ soonCardStyle }}\">\n      <div style=\"width:40px; height:40px; border-radius:11px; background:#fdf1e0; display:flex; align-items:center; justify-content:center; flex:none;\"><div style=\"width:14px; height:14px; border-radius:50%; background:#e08a1e;\"><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-size:25px; font-weight:700; line-height:1; color:#b76b09;\">{{ statSoon }}<\u002Fdiv><div style=\"font-size:12px; color:#94897b; margin-top:4px; font-weight:500;\">Expiring soon<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ onFilterExpired }}\" title=\"Filter: expired lots\" style=\"{{ expiredCardStyle }}\">\n      <div style=\"width:40px; height:40px; border-radius:11px; background:#fdeceb; display:flex; align-items:center; justify-content:center; flex:none;\"><div style=\"width:13px; height:13px; background:#d9534f; transform:rotate(45deg);\"><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-size:25px; font-weight:700; line-height:1; color:#c0392b;\">{{ statExpired }}<\u002Fdiv><div style=\"font-size:12px; color:#94897b; margin-top:4px; font-weight:500;\">Expired lots<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ onFilterLow }}\" title=\"Filter: low stock\" style=\"{{ lowCardStyle }}\">\n      <div style=\"width:40px; height:40px; border-radius:11px; background:#fdf1e0; display:flex; align-items:center; justify-content:center; flex:none;\"><div style=\"width:16px; height:6px; border-radius:3px; background:#e08a1e;\"><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-size:25px; font-weight:700; line-height:1; color:#b76b09;\">{{ statLow }}<\u002Fdiv><div style=\"font-size:12px; color:#94897b; margin-top:4px; font-weight:500;\">Low stock<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ onFilterZero }}\" title=\"Filter: zero stock\" style=\"{{ zeroCardStyle }}\">\n      <div style=\"width:40px; height:40px; border-radius:11px; background:#f3eee8; display:flex; align-items:center; justify-content:center; flex:none;\"><div style=\"width:16px; height:16px; border-radius:5px; border:2.5px solid #8a8175;\"><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-size:25px; font-weight:700; line-height:1; color:#6b6357;\">{{ statZero }}<\u002Fdiv><div style=\"font-size:12px; color:#94897b; margin-top:4px; font-weight:500;\">Zero stock<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showMain }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"display:grid; grid-template-columns:352px minmax(320px,1fr) 364px; gap:20px; padding:20px 28px 44px; align-items:start; min-width:1360px;\">\n\n    <aside style=\"background:#fff; border:1px solid #ece4d8; border-radius:14px; padding:14px; position:sticky; top:88px;\">\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:14px; margin-bottom:10px;\">Departments<\u002Fdiv>\n      <button onclick=\"{{ onSelectAll }}\" style=\"{{ allStyle }}\">\n        <span style=\"flex:1; text-align:left;\">All departments<\u002Fspan>\n        <span style=\"{{ allCountStyle }}\">{{ statTotal }}<\u002Fspan>\n      <\u002Fbutton>\n      <sc-for list=\"{{ navDepts }}\" as=\"nav\" hint-placeholder-count=\"3\">\n        <div style=\"{{ nav.rowStyle }}\">\n          <button onclick=\"{{ nav.onClick }}\" style=\"{{ nav.btnStyle }}\">\n            <span style=\"flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ nav.name }}<\u002Fspan>\n            <sc-if value=\"{{ nav.hasIssues }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:7px; height:7px; border-radius:50%; background:#e08a1e; flex:none;\"><\u002Fspan><\u002Fsc-if>\n            <span style=\"{{ nav.countStyle }}\">{{ nav.count }}<\u002Fspan>\n          <\u002Fbutton>\n          <button onclick=\"{{ nav.onEdit }}\" title=\"Edit department\" style=\"{{ nav.delStyle }}\" style-hover=\"background:#eef3fb;color:#2a6fdb;\">✎<\u002Fbutton>\n          <button onclick=\"{{ nav.onDelete }}\" title=\"Delete department\" style=\"{{ nav.delStyle }}\" style-hover=\"background:#fdeceb;color:#c0392b;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"margin-top:13px; padding-top:13px; border-top:1px solid #f2ebe1;\">\n        <input name=\"newDeptName\" value=\"{{ form.newDeptName }}\" onchange=\"{{ handleField }}\" placeholder=\"New department name\" style=\"width:100%; padding:9px 11px; border:1px solid #e3dacd; background:#fbf9f6; border-radius:9px; font-size:13px; outline:none; color:#2b2723;\">\n        <button onclick=\"{{ addDepartment }}\" style=\"width:100%; padding:9px; border:1px dashed #d8cfbf; background:transparent; color:#5c5448; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer; margin-top:7px;\" style-hover=\"border-color:var(--accent);color:var(--accent);\">+ Add department<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <main style=\"display:flex; flex-direction:column; gap:16px; min-width:0;\">\n      <sc-if value=\"{{ connecting }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff; border:1px solid #ece4d8; border-radius:14px; padding:44px 24px; text-align:center; color:#94897b; font-size:13.5px;\">Connecting to the shared inventory…<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noDepts }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff; border:1px dashed #e0d6c7; border-radius:14px; padding:56px 24px; text-align:center;\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-size:18px; font-weight:600; margin-bottom:6px;\">No departments yet<\u002Fdiv>\n          <div style=\"font-size:13.5px; color:#94897b;\">Add your first department from the left panel to get started.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ showList }}\" hint-placeholder-val=\"{{ true }}\">\n        <section style=\"background:#fff; border:1px solid #ece4d8; border-radius:14px; overflow:hidden; box-shadow:0 1px 2px rgba(43,39,35,.03);\">\n          <div style=\"display:flex; align-items:center; gap:11px; padding:15px 18px; border-bottom:1px solid #f4eee4;\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:16px;\">Reagents<\u002Fdiv>\n            <div style=\"font-size:12px; color:#94897b;\">{{ listContext }} · {{ listCountLabel }}<\u002Fdiv>\n            <sc-if value=\"{{ filterActive }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ clearStatFilter }}\" style=\"display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:20px; border:1px solid #f0d9b8; background:#fdf1e0; color:#b76b09; font-size:11px; font-weight:600; cursor:pointer;\">{{ filterLabel }} ✕<\u002Fbutton>\n            <\u002Fsc-if>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <button onclick=\"{{ newReagent }}\" style=\"padding:6px 12px; border:1px solid #d8eeea; background:#e9f6f3; color:#0b7d72; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer;\" style-hover=\"background:#d6efe9;\">+ New reagent<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ listEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:44px 18px; text-align:center; font-size:13px; color:#a89d8c;\">{{ listEmptyText }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ reagentList }}\" as=\"item\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ item.onSelect }}\" style=\"display:flex; align-items:center; gap:12px; padding:13px 18px; border-top:1px solid #f4eee4; cursor:pointer;\" style-hover=\"background:#fbf9f6;\">\n              <div style=\"min-width:0; flex:1;\">\n                <div style=\"font-weight:600; font-size:14.5px;\">{{ item.name }}<\u002Fdiv>\n                <div style=\"display:flex; gap:10px; margin-top:3px; font-size:11.5px; color:#94897b;\">\n                  <sc-if value=\"{{ item.showDept }}\" hint-placeholder-val=\"{{ false }}\"><span>{{ item.deptName }}<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ item.hasOrdering }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:ui-monospace,SFMono-Regular,monospace; color:#8a8175;\">MC {{ item.orderingNumber }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:6px; align-items:center; flex:none;\">\n                <sc-if value=\"{{ item.hasExpired }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; background:#fdeceb; color:#c0392b;\">Expired<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ item.hasSoon }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; background:#fdf1e0; color:#b76b09;\">Soon<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ item.low }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; background:#fdf1e0; color:#b76b09;\">Low<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:13px; color:#5c5448; width:88px; text-align:right; flex:none;\">{{ item.totalLabel }}<\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#b3a892; width:52px; text-align:right; flex:none;\">{{ item.lotCountLabel }}<\u002Fdiv>\n              <button onclick=\"{{ item.onDelete }}\" title=\"Delete reagent\" style=\"width:26px; height:26px; flex:none; display:inline-flex; align-items:center; justify-content:center; border:1px solid #ecddd9; background:#fff; color:#c98b84; border-radius:7px; font-size:12px; cursor:pointer; line-height:1;\" style-hover=\"background:#fdeceb;color:#c0392b;border-color:#f3c9c4;\">✕<\u002Fbutton>\n              <span style=\"color:#c9bfae; font-size:18px; flex:none; line-height:1;\">›<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showDetail }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:#fff; border:1px solid #ece4d8; border-radius:14px; overflow:hidden; box-shadow:0 1px 2px rgba(43,39,35,.03);\">\n          <div style=\"display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid #f4eee4;\">\n            <button onclick=\"{{ backToList }}\" style=\"padding:6px 12px; border:1px solid #e3dacd; background:#fff; color:#5c5448; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:#f7f3ee;\">← Reagents<\u002Fbutton>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <button onclick=\"{{ detail.onAddLot }}\" style=\"display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border:1px solid #cfe8e2; background:#e9f6f3; color:#0b7d72; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; margin-right:8px;\" style-hover=\"background:#d6efe9;\">＋ Add new lot<\u002Fbutton>\n            <button onclick=\"{{ detail.onEdit }}\" style=\"display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border:1px solid #dfe6ef; background:#fff; color:#2a6fdb; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; margin-right:8px;\" style-hover=\"background:#eef3fb;\">✎ Edit<\u002Fbutton>\n            <button onclick=\"{{ detail.onDelete }}\" title=\"Delete reagent\" style=\"width:30px; height:30px; flex:none; display:inline-flex; align-items:center; justify-content:center; border:1px solid #ecddd9; background:#fff; color:#c98b84; border-radius:8px; font-size:14px; cursor:pointer; line-height:1;\" style-hover=\"background:#fdeceb;color:#c0392b;border-color:#f3c9c4;\">✕<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:18px;\">\n            <div style=\"display:flex; align-items:center; gap:10px;\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:20px; letter-spacing:-.01em;\">{{ detail.name }}<\u002Fdiv>\n              <sc-if value=\"{{ detail.low }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"padding:2px 9px; border-radius:20px; font-size:10.5px; font-weight:700; background:#fdf1e0; color:#b76b09; letter-spacing:.02em;\">LOW STOCK<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#94897b; margin-top:3px;\">{{ detail.deptName }} · {{ detail.totalLabel }} in stock<\u002Fdiv>\n            <div style=\"display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;\">\n              <div style=\"flex:0 0 auto; min-width:140px; padding:11px 14px; background:#f7f3ee; border:1px solid #efe6d8; border-radius:11px;\">\n                <div style=\"font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:#a89d8c; font-weight:600; margin-bottom:4px;\">MC Code<\u002Fdiv>\n                <div style=\"font-size:14.5px; font-weight:600; font-family:ui-monospace,SFMono-Regular,monospace; color:#2b2723;\">{{ detail.mcCode }}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ detail.hasDescription }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"flex:1; min-width:200px; padding:11px 14px; background:#f7f3ee; border:1px solid #efe6d8; border-radius:11px;\">\n                  <div style=\"font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:#a89d8c; font-weight:600; margin-bottom:4px;\">Description<\u002Fdiv>\n                  <div style=\"font-size:13.5px; color:#5c5448; line-height:1.5;\">{{ detail.description }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"margin-top:18px;\">\n              <div style=\"display:grid; grid-template-columns:minmax(60px,1fr) 92px 96px 84px 92px 96px; gap:8px; padding:2px 12px 6px; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:#bcb19f; font-weight:600;\">\n                <div>Lot<\u002Fdiv><div>Expiry<\u002Fdiv><div>Quantity<\u002Fdiv><div>Status<\u002Fdiv><div>Lot-to-Lot<\u002Fdiv><div><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ detail.noLots }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:24px; text-align:center; font-size:13px; color:#a89d8c;\">No lots yet — add one from the right panel.<\u002Fdiv><\u002Fsc-if>\n              <div style=\"display:flex; flex-direction:column; gap:7px;\">\n                <sc-for list=\"{{ detail.lots }}\" as=\"lot\" hint-placeholder-count=\"2\">\n                  <div style=\"display:grid; grid-template-columns:minmax(60px,1fr) 92px 96px 84px 92px 96px; gap:8px; align-items:center; padding:9px 12px; background:#fbf9f6; border:1px solid #f2ebe1; border-radius:9px; font-size:13px;\">\n                    <div><div>Lot <strong style=\"font-weight:700;\">{{ lot.lotNumber }}<\u002Fstrong><\u002Fdiv><sc-if value=\"{{ lot.hasReceived }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:10.5px; color:#a89d8c; margin-top:2px;\">{{ lot.receivedLabel }}<\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ lot.hasAddedBy }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:10.5px; color:#a89d8c; margin-top:2px;\">{{ lot.addedByLabel }}<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n                    <div style=\"color:#5c5448;\">{{ lot.expiryDisplay }}<\u002Fdiv>\n                    <div style=\"{{ lot.qtyStyle }}\">{{ lot.qtyLabel }}<\u002Fdiv>\n                    <div><span style=\"{{ lot.badgeStyle }}\">{{ lot.statusLabel }}<\u002Fspan><\u002Fdiv>\n                    <div><span style=\"{{ lot.ltlStyle }}\">{{ lot.ltlLabel }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex; gap:6px; justify-content:flex-end; align-items:center;\"><button onclick=\"{{ lot.onTake }}\" style=\"padding:5px 12px; border:1px solid var(--accent); background:#fff; color:var(--accent); border-radius:7px; font-size:11.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:var(--accent);color:#fff;\">Take<\u002Fbutton><button onclick=\"{{ lot.onEdit }}\" title=\"Edit lot\" style=\"width:26px; height:26px; flex:none; display:inline-flex; align-items:center; justify-content:center; border:1px solid #dfe6ef; background:#fff; color:#5c84c4; border-radius:7px; font-size:12px; cursor:pointer; line-height:1;\" style-hover=\"background:#eef3fb;color:#2a6fdb;border-color:#c4d6f0;\">✎<\u002Fbutton><button onclick=\"{{ lot.onDelete }}\" title=\"Delete lot\" style=\"width:26px; height:26px; flex:none; display:inline-flex; align-items:center; justify-content:center; border:1px solid #ecddd9; background:#fff; color:#c98b84; border-radius:7px; font-size:12px; cursor:pointer; line-height:1;\" style-hover=\"background:#fdeceb;color:#c0392b;border-color:#f3c9c4;\">✕<\u002Fbutton><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:22px; padding-top:18px; border-top:1px solid #f4eee4;\">\n              <button onclick=\"{{ detail.onToggleActivity }}\" style=\"display:flex; align-items:center; gap:8px; width:100%; padding:10px 12px; border:1px solid #ece4d8; background:#fbf9f6; border-radius:9px; cursor:pointer; font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:14px; color:#2b2723;\" style-hover=\"background:#f4eee4;\">\n                <span style=\"flex:1; text-align:left;\">Activity for this reagent<\u002Fspan>\n                <span style=\"font-size:12px; font-weight:600; color:#94897b;\">{{ detail.activityToggleLabel }}<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{ detail.activityOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:10px;\">\n                  <sc-if value=\"{{ detail.noActivity }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px; color:#a89d8c; padding:4px 2px 8px;\">No activity recorded for this reagent yet.<\u002Fdiv><\u002Fsc-if>\n                  <div style=\"display:flex; flex-direction:column;\">\n                    <sc-for list=\"{{ detail.activity }}\" as=\"act\" hint-placeholder-count=\"3\">\n                      <div style=\"display:flex; gap:11px; padding:9px 2px; border-bottom:1px solid #f4eee4;\">\n                        <span style=\"{{ act.dotStyle }}\"><\u002Fspan>\n                        <div style=\"flex:1; min-width:0;\">\n                          <div style=\"font-size:13px; font-weight:600;\">{{ act.line }}<\u002Fdiv>\n                          <div style=\"font-size:11.5px; color:#94897b; margin-top:1px;\">{{ act.detail }}<\u002Fdiv>\n                        <\u002Fdiv>\n                        <div style=\"font-size:11.5px; color:#b3a892; white-space:nowrap;\">{{ act.when }}<\u002Fdiv>\n                        <button onclick=\"{{ act.onDelete }}\" title=\"Delete this activity entry\" style=\"flex:none; width:22px; height:22px; border:none; background:transparent; color:#c9beac; border-radius:6px; cursor:pointer; font-size:14px; line-height:1;\" style-hover=\"background:#fbeceb; color:#c0392b;\">✕<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n    <\u002Fmain>\n\n    <aside style=\"display:flex; flex-direction:column; gap:16px; position:sticky; top:88px;\">\n      <div style=\"background:#fff; border:1px solid #ece4d8; border-radius:14px; padding:16px; box-shadow:0 1px 2px rgba(43,39,35,.03);\">\n        <div style=\"display:flex; background:#f2ebe1; border-radius:11px; padding:4px; gap:4px;\">\n          <button onclick=\"{{ setAdd }}\" style=\"{{ addBtnStyle }}\">Add lot<\u002Fbutton>\n          <button onclick=\"{{ setTake }}\" style=\"{{ takeBtnStyle }}\">Take from stock<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ isAdd }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:15px; display:flex; flex-direction:column; gap:11px;\">\n            <div>\n              <label style=\"display:block; font-size:11.5px; font-weight:600; color:#776e60; margin-bottom:5px;\">Department<\u002Flabel>\n              <select name=\"addDeptId\" value=\"{{ form.addDeptId }}\" onchange=\"{{ handleField }}\" style=\"width:100%; padding:9px 11px; border:1px solid #e3dacd; background:#fbf9f6; border-radius:9px; font-size:13.5px; outline:none; color:#2b2723;\">\n                <option value=\"\">Select department…<\u002Foption>\n                <sc-for list=\"{{ deptOptions }}\" as=\"d\" hint-placeholder-count=\"3\"><option value=\"{{ d.id }}\">{{ d.name }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"position:relative;\">\n              <label style=\"display:block; font-size:11.5px; font-weight:600; color:#776e60; margin-bottom:5px;\">Reagent<\u002Flabel>\n              <input name=\"addReagentQuery\" value=\"{{ form.addReagentQuery }}\" onchange=\"{{ handleField }}\" onfocus=\"{{ openReagentDropdown }}\" autocomplete=\"off\" placeholder=\"Search by name or MC Code…\" style=\"width:100%; padding:9px 11px; border:1px solid #e3dacd; background:#fbf9f6; border-radius:9px; font-size:13.5px; outline:none; color:#2b2723;\">\n              <sc-if value=\"{{ addReagentOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div onclick=\"{{ closeReagentDropdown }}\" style=\"position:fixed; inset:0; z-index:30;\"><\u002Fdiv>\n                <div style=\"position:absolute; left:0; right:0; top:100%; margin-top:4px; z-index:31; background:#fff; border:1px solid #e3dacd; border-radius:9px; box-shadow:0 10px 28px rgba(43,39,35,.16); max-height:240px; overflow:auto;\">\n                  <sc-if value=\"{{ addReagentDeptChosen }}\" hint-placeholder-val=\"{{ true }}\">\n                    <sc-for list=\"{{ addReagentChoices }}\" as=\"c\" hint-placeholder-count=\"3\">\n                      <div onclick=\"{{ c.onClick }}\" style=\"display:flex; align-items:center; gap:8px; padding:9px 12px; cursor:pointer; border-bottom:1px solid #f4eee4; font-size:13.5px;\" style-hover=\"background:#f7f3ee;\">\n                        <span style=\"flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ c.name }}<\u002Fspan>\n                        <sc-if value=\"{{ c.hasSub }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11px; color:#a89d8c; font-family:ui-monospace,monospace; flex:none;\">{{ c.sub }}<\u002Fspan><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                    <sc-if value=\"{{ noReagentChoices }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:9px 12px; font-size:12.5px; color:#a89d8c;\">No matching reagents.<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ addReagentNoDept }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:9px 12px; font-size:12.5px; color:#a89d8c;\">Select a department first.<\u002Fdiv><\u002Fsc-if>\n                  <div onclick=\"{{ pickNewReagent }}\" style=\"padding:9px 12px; cursor:pointer; font-size:13px; font-weight:600; color:#0b7d72; background:#f3faf8;\" style-hover=\"background:#e9f6f3;\">+ New reagent…<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <sc-if value=\"{{ showNewReagent }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; flex-direction:column; gap:11px; padding:12px; backgroun order:1px solid #e3dacd; background:#fff; color:#5c5448; border-radius:9px; font-size:13.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:#f7f3ee;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ runBackupExport }}\" style=\"padding:9px 16px; border:none; background:#b76b09; color:#fff; border-radius:9px; font-size:13.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:#9c5a06;\">Download backup<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ backupIsRestore }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12.5px; color:#c0392b; background:#fdeceb; border:1px solid #f6cfcb; border-radius:9px; padding:10px 12px; margin-bottom:16px; line-height:1.5; font-weight:500;\">This replaces ALL current data with the contents of the backup file. This cannot be undone.<\u002Fdiv>\n          <div style=\"margin-bottom:16px;\">\n            <label style=\"display:block; font-size:11.5px; font-weight:600; color:#776e60; margin-bottom:6px;\">Backup file (.xlsx only)<\u002Flabel>\n            <label style=\"display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px dashed #d8cfbf; border-radius:10px; cursor:pointer; background:#fbf9f6;\" style-hover=\"border-color:#b76b09;\">\n              <span style=\"display:inline-flex; align-items:center; justify-content:center; padding:5px 11px; border-radius:8px; background:#fdf1e0; color:#b76b09; font-size:12px; font-weight:600; flex:none;\">Choose file<\u002Fspan>\n              <span style=\"font-size:12.5px; color:#5c5448; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ backupFileLabel }}<\u002Fspan>\n              <input type=\"file\" accept=\".xlsx\" onchange=\"{{ handleBackupFile }}\" style=\"display:none;\">\n            <\u002Flabel>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:20px;\">\n            <label style=\"display:block; font-size:11.5px; font-weight:600; color:#776e60; margin-bottom:5px;\">Password <span style=\"color:#c0392b; font-weight:600;\">(required to restore)<\u002Fspan><\u002Flabel>\n            <input name=\"backupPwd\" type=\"password\" value=\"{{ form.backupPwd }}\" onchange=\"{{ handleField }}\" placeholder=\"Enter password\" style=\"width:100%; padding:9px 11px; border:1px solid #e3dacd; background:#fbf9f6; border-radius:9px; font-size:13.5px; outline:none; color:#2b2723;\">\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:10px; justify-content:flex-end;\">\n            <button onclick=\"{{ closeBackup }}\" style=\"padding:9px 16px; border:1px solid #e3dacd; background:#fff; color:#5c5448; border-radius:9px; font-size:13.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:#f7f3ee;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ runBackupRestore }}\" style=\"padding:9px 16px; border:none; background:#c0392b; color:#fff; border-radius:9px; font-size:13.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:#a02f24;\">{{ backupRestoreBtnLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ toastShow }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; right:24px; bottom:24px; background:#2b2723; color:#fff; padding:13px 18px; border-radius:11px; font-size:13.5px; font-weight:500; box-shadow:0 10px 28px rgba(0,0,0,.2); animation:toastIn .25s ease; display:flex; align-items:center; gap:10px; z-index:50;\">\n      <span style=\"{{ toastDotStyle }}\"><\u002Fspan>\n      {{ toastText }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;nearExpiryDays&quot;: {&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:30,&quot;min&quot;:7,&quot;max&quot;:90,&quot;step&quot;:1,&quot;unit&quot;:&quot; days&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Behavior&quot;},\n  &quot;defaultUser&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;}\n}\">\nclass Component extends DCLogic {\n  SB_URL = 'https://pcitwgxaaeomfdryyhsv.supabase.co';\n  SB_KEY = 'sb_publishable_65YfA1ScXMGlkjZdEzNHXA_pFgKxqSa';\n\n  state = {\n    departments: [],\n    activity: [],\n    selectedDeptId: 'all',\n    selectedReagentId: null,\n    statFilter: null,\n    mode: 'add',\n    page: 'main',\n    addReagentOpen: false,\n    takeReagentOpen: false,\n    toast: null,\n    confirm: null,\n    exportOpen: false,\n    importOpen: false,\n    importFileName: '',\n    importBusy: false,\n    backupOpen: false,\n    backupTab: 'export',\n    backupFileName: '',\n    backupBusy: false,\n    edit: null,\n    editForm: {},\n    editPwd: '',\n    reagentActivityOpen: false,\n    loaded: false,\n    status: 'connecting',\n    form: {\n      addDeptId:'', addReagentId:'', addReagentQuery:'', addReagentNew:'', addUnit:'', addThreshold:'', addOrdering:'', addDescription:'', addNewPwd:'', addLot:'', addExpiry:'', addReceive:'', addQty:'', addUser:'', addLtl:'no',\n      takeDeptId:'', takeReagentId:'', takeReagentQuery:'', takeLotId:'', takeQty:'', takeUser:'', takeLtl:'',\n      newDeptName:'', search:'', delPwd:'', exportDeptIds:[], exportType:'full', exportZero:'yes', importPwd:'', backupPwd:'',\n    },\n  };\n  DELETE_PASSWORD = '2026';\n\n  uuid = () => (window.crypto && crypto.randomUUID ? crypto.randomUUID() : 'id' + Date.now() + Math.random().toString(16).slice(2));\n\n  waitForLib = () => new Promise((res) => {\n    if (window.supabase && window.supabase.createClient) return res(true);\n    let n = 0;\n    const t = setInterval(() => {\n      if (window.supabase && window.supabase.createClient) { clearInterval(t); res(true); }\n      else if (++n > 100) { clearInterval(t); res(false); }\n    }, 100);\n  });\n\n  async componentDidMount() {\n    const du = this.props.defaultUser;\n    const today = new Date();\n    const iso = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');\n    this.setState(s => ({ form: { ...s.form, addReceive: s.form.addReceive || iso, takeUser: s.form.takeUser || du || '', addUser: s.form.addUser || du || '' } }));\n    const ok = await this.waitForLib();\n    if (!ok) { this.setState({ status: 'error', loaded: true }); return this.notify('Could not load the sync library', 'error'); }\n    try {\n      this.sb = window.supabase.createClient(this.SB_URL, this.SB_KEY);\n    } catch (e) { this.setState({ status: 'error', loaded: true }); return this.notify('Connection failed', 'error'); }\n    await this.fetchAll(true);\n    this.subscribe();\n    this.poll = setInterval(() => this.fetchAll(), 15000);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this.poll);\n    clearTimeout(this._d);\n    clearTimeout(this._t);\n    if (this._ch && this.sb) { try { this.sb.removeChannel(this._ch); } catch (e) {} }\n  }\n\n  notify = (text, type) => {\n    this.setState({ toast: { text, type: type || 'success' } });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ toast: null }), 3400);\n  };\n\n  fetchAll = async (seedIfEmpty) => {\n    if (!this.sb) return;\n    try {\n      const [dRes, rRes, lRes, aRes] = await Promise.all([\n        this.sb.from('departments').select('*').order('created_at', { ascending: true }),\n        this.sb.from('reagents').select('*').order('created_at', { ascending: true }),\n        this.sb.from('lots').select('*').order('created_at', { ascending: true }),\n        this.sb.from('activity').select('*').order('ts', { ascending: false }).limit(80),\n      ]);\n      const err = dRes.error || rRes.error || lRes.error || aRes.error;\n      if (err) throw err;\n      const depts = dRes.data || [], reags = rRes.data || [], lots = lRes.data || [], acts = aRes.data || [];\n      if (seedIfE
